<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- css 불러오기 -->
    <link rel="stylesheet" href="style.css">
</head>
<!-- 
HTML
- 태그라는 것으로 구성
- 태그는 여는 태그, 닫는 태그 세트
  - 여는태그 : <태그이름>, 닫는 태그: </태그이름>
  - 예외적으로 혼자 쓰는 태그 존재
- 태그 세트 -> 엘리먼트
-->

<body>
    <!-- 제목 태그로 이루어진 엘리먼트 -->
    <h1>뉴스 제목 1</h1>

    <!-- 내용관련 엘리먼트 -->
    <p>기사 내용입니다 1</p>

    <!-- 링크 이동 엘리먼트 -->
    <a href="https://www.naver.com">네이버로 이동</a>

    <!-- 부모 엘리먼트 -->
    <div>
        <!-- 자식 엘리먼트 -->
        <h1 id="sub2" class="sub_2">뉴스 제목 2</h1>
        <p>기사 내용입니다 2</p>

        <h1 id="sub22" class="sub_2 sub_2_2">뉴스 제목 2</h1>
        <p>기사 내용입니다 2</p>
    </div>
    <!-- 
    태그(태그 이름으로 검색)
        - 이름 -> 동명이인 가능
    class(. 으로 검색)
        - 별명(여러명이 같은 별명을 가질 수 있음, 한 명이 여러 개 가질 수 있음)
    id(# 으로 검색)
        - 주민등록번호(절대로 한 html내에서 같은 id를 쓸 수 없음)
    -->

    <!-- 아래 형식으로도 css 작성이 가능 -->
    <style>
        h1 {
            color: red;
        }

        div {
            background-color: green;
        }

        div>h1 {
            color: blue;
        }

        div>.sub_2 {
            background-color: yellow;
        }

        #sub2 {
            background-color: pink;
        }
    </style>
</body>

</html>
